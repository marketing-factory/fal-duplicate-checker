name: Create GitHub Release and Publish to TER

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Create GitHub Release and Publish to TER
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tag message
        id: tag-message
        run: |
          {
            echo 'body<<EOF'
            git tag -l --format='%(contents)' '${{ github.ref_name }}'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.tag-message.outputs.body }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Tailor
        run: composer global require typo3/tailor

      - name: Set extension version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          ~/.composer/vendor/bin/tailor set-version "$TAG"

      - name: Publish to TER
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          ~/.composer/vendor/bin/tailor ter:publish --comment "${{ steps.tag-message.outputs.body }}" "$TAG"
