name: Publish to TER

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to TER
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Tailor
        run: composer global require typo3/tailor

      - name: Set extension version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          ~/.composer/vendor/bin/tailor set-version "$TAG"

      - name: Publish to TER
        env:
          TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          ~/.composer/vendor/bin/tailor ter:publish --comment "${{ github.event.release.body }}" "$TAG"
